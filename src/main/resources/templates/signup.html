<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Signup - WorkWith</title>
    <link rel="stylesheet" th:href="@{/css/portal.css}">
</head>
<body data-page="signup">
<div th:replace="~{fragments/layout :: header('signup')}"></div>

<div class="wrap">
    <div class="grid">
        <section class="panel">
            <div class="hd">가입 안내</div>
            <div class="bd">
                <div class="callout">
                    기본 권한은 <b>ROLE_USER</b>로 설정됩니다.<br>
                    가입 후 로그인하면 메인(포털)에서 프로젝트/이슈를 확인할 수 있어요.
                </div>
                <div class="field" style="margin-top:16px;">
                    <div class="muted">· 이메일은 로그인 ID로 사용됩니다</div>
                    <div class="muted">· Notion ID는 추후 알림 연동에 사용됩니다</div>
                    <div class="muted">· 가입 후 프로젝트 참여 요청이 가능합니다</div>
                    <div class="muted">· 권한 변경은 관리자에게 문의하세요</div>
                </div>
            </div>
        </section>

        <section class="panel">
            <div class="hd">회원가입</div>
            <div class="bd">
                <form th:action="@{/signup}" th:object="${member}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                    <div class="field">
                        <label for="email">이메일</label>
                        <input type="text" id="email" th:field="*{email}" autocomplete="username">
                    </div>
                    <div class="field">
                        <label for="name">이름</label>
                        <input type="text" id="name" th:field="*{name}" autocomplete="name">
                    </div>
                    <div class="field">
                        <label for="password">비밀번호</label>
                        <input type="password" id="password" th:field="*{password}" autocomplete="new-password" required>
                    </div>
                    <div class="field">
                        <label for="notionId">Notion ID <span style="color:var(--warn);">*</span></label>
                        <input type="text" id="notionId" th:field="*{notionId}" placeholder="Notion 사용자 ID (알림 연동용)" autocomplete="off" required>
                    </div>

                    <input type="hidden" th:field="*{role}" value="ROLE_USER"/>

                    <div class="actions">
                        <button class="btn primary" type="submit">가입하기</button>
                        <a class="btn" th:href="@{/}">홈</a>
                    </div>
                    <div class="muted" style="margin-top:10px;">
                        이미 계정이 있으신가요? <a th:href="@{/login}"><b>로그인</b></a>
                    </div>
                </form>
            </div>
        </section>
    </div>

    <div th:replace="~{fragments/layout :: footer}"></div>
</div>

<script th:src="@{/js/portal.js}"></script>
</body>
</html>
